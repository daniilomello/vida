service: vida-backend

frameworkVersion: "4"

provider: ${file(./sls/provider.yml)}

package:
  individually: true

build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    format: cjs
    exclude:
      - '@aws-sdk/*'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    noPrependStageInUrl: true

  # Wildcard origin is forbidden when credentials are included; exact origin required.
  corsConfig:
    origin: ${env:FRONTEND_ORIGIN, 'http://localhost:5173'}
    headers:
      - Content-Type
      - X-Requested-With
    allowCredentials: true

functions: ${file(./sls/functions.yml)}

resources:
  - ${file(./sls/resources/dynamodb.yml)}
  - ${file(./sls/resources/cognito.yml)}
  - ${file(./sls/resources/gateway-responses.yml)}
  - ${file(./sls/outputs.yml)}
