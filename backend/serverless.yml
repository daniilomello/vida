service: vida-backend

frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'local'}

  environment:
    STAGE: ${self:provider.stage}
    FRONTEND_ORIGIN: ${env:FRONTEND_ORIGIN, 'http://localhost:5173'}
    DYNAMODB_TABLE: FinanceApp-Data
    SES_FROM_EMAIL: ${env:SES_FROM_EMAIL, 'noreply@vida.app'}

  # Rate limiting: 100 req/s burst, 50 req/s steady-state (spec section 3.4).
  # Note: usagePlan throttle is enforced per API key. This app uses cookie-based
  # Cognito auth (not API keys), so this provisions the usage plan infra as specified.
  # True stage-level throttle for all traffic requires a custom CF MethodSettings resource.
  apiGateway:
    usagePlan:
      throttle:
        burstLimit: 100
        rateLimit: 50

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - !GetAtt FinanceAppTable.Arn
            - !Sub "${FinanceAppTable.Arn}/index/GSI-Type"
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource:
            - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${env:SES_FROM_EMAIL, 'noreply@vida.app'}"

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap:
      type: linked
      setNodeOptions: true
    buildConcurrency: 10

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    noPrependStageInUrl: true

  # Reusable CORS config — referenced as *cors on every http event (spec section 3.4)
  # Wildcard origin is forbidden when credentials are included; exact origin required.
  cors: &cors
    origin: ${env:FRONTEND_ORIGIN, 'http://localhost:5173'}
    headers:
      - Content-Type
      - X-Requested-With
    allowCredentials: true

functions:
  health:
    handler: src/handlers/health.handler
    events:
      - http:
          path: api/v1/health
          method: get
          cors: *cors

  defineAuthChallenge:
    handler: src/handlers/auth/defineAuthChallenge.handler

  createAuthChallenge:
    handler: src/handlers/auth/createAuthChallenge.handler

  verifyAuthChallengeResponse:
    handler: src/handlers/auth/verifyAuthChallengeResponse.handler

resources:
  Resources:
    FinanceAppTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: FinanceApp-Data
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: type
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI-Type
            KeySchema:
              - AttributeName: type
                KeyType: HASH
              - AttributeName: PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    # Grant Cognito permission to invoke each trigger Lambda
    DefineAuthChallengeLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt DefineAuthChallengeLambdaFunction.Arn
        Principal: cognito-idp.amazonaws.com
        SourceArn: !GetAtt CognitoUserPool.Arn

    CreateAuthChallengeLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt CreateAuthChallengeLambdaFunction.Arn
        Principal: cognito-idp.amazonaws.com
        SourceArn: !GetAtt CognitoUserPool.Arn

    VerifyAuthChallengeResponseLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt VerifyAuthChallengeResponseLambdaFunction.Arn
        Principal: cognito-idp.amazonaws.com
        SourceArn: !GetAtt CognitoUserPool.Arn

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: VidaUserPool-${self:provider.stage}
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        EmailConfiguration:
          EmailSendingAccount: DEVELOPER
          SourceArn: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${env:SES_FROM_EMAIL, 'noreply@vida.app'}"
        LambdaConfig:
          DefineAuthChallenge: !GetAtt DefineAuthChallengeLambdaFunction.Arn
          CreateAuthChallenge: !GetAtt CreateAuthChallengeLambdaFunction.Arn
          VerifyAuthChallengeResponse: !GetAtt VerifyAuthChallengeResponseLambdaFunction.Arn
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
        Schema:
          - Name: email
            AttributeDataType: String
            Required: true
            Mutable: false
        AccountRecoverySetting:
          RecoveryMechanisms:
            - Name: verified_email
              Priority: 1

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: VidaWebClient-${self:provider.stage}
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_CUSTOM_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        PreventUserExistenceErrors: ENABLED
        TokenValidityUnits:
          AccessToken: minutes
          IdToken: minutes
          RefreshToken: days
        AccessTokenValidity: 60
        IdTokenValidity: 60
        RefreshTokenValidity: 30

    # SES email identity used for sending OTP emails.
    # After deployment, the address must be verified in the AWS Console
    # (or DNS records added if using a domain identity) before SES can send emails.
    SESEmailIdentity:
      Type: AWS::SES::EmailIdentity
      Properties:
        EmailIdentity: ${env:SES_FROM_EMAIL, 'noreply@vida.app'}

  Outputs:
    CognitoUserPoolId:
      Value: !Ref CognitoUserPool
      Export:
        Name: VidaCognitoUserPoolId-${self:provider.stage}
    CognitoUserPoolClientId:
      Value: !Ref CognitoUserPoolClient
      Export:
        Name: VidaCognitoUserPoolClientId-${self:provider.stage}
