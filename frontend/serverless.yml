service: vida-frontend
frameworkVersion: "4"

provider:
  name: aws
  region: us-east-1
  stage: ${opt:stage, 'staging'}

params:
  default:
    domain: vida-staging.danilabs.com.br
    apiGatewayDomain: x37y1ygnpb.execute-api.us-east-1.amazonaws.com
    apiGatewayStage: staging
  dev:
    domain: vida-dev.danilabs.com.br
    apiGatewayDomain: 7392ysbevf.execute-api.us-east-1.amazonaws.com
    apiGatewayStage: dev
  staging:
    domain: vida-staging.danilabs.com.br
    apiGatewayDomain: x37y1ygnpb.execute-api.us-east-1.amazonaws.com
    apiGatewayStage: staging
  prod:
    domain: vida.danilabs.com.br
    apiGatewayDomain: j91buw434c.execute-api.us-east-1.amazonaws.com
    apiGatewayStage: prod

resources:
  Resources:

    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: vida-frontend-${self:provider.stage}

    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub "${FrontendBucket.Arn}/*"
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

    FrontendOAC:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: vida-frontend-oac-${self:provider.stage}
          OriginAccessControlOriginType: s3
          SigningBehavior: always
          SigningProtocol: sigv4

    FrontendCertificate:
      Type: AWS::CertificateManager::Certificate
      Properties:
        DomainName: ${param:domain}
        ValidationMethod: DNS
        DomainValidationOptions:
          - DomainName: ${param:domain}
            HostedZoneId: ${env:HOSTED_ZONE_ID}

    FrontendDistribution:
      Type: AWS::CloudFront::Distribution
      DependsOn: FrontendBucket
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          Aliases:
            - ${param:domain}
          Origins:
            - Id: S3Origin
              DomainName: !GetAtt FrontendBucket.RegionalDomainName
              OriginAccessControlId: !GetAtt FrontendOAC.Id
              S3OriginConfig: {}
            - Id: ApiGatewayOrigin
              DomainName: ${param:apiGatewayDomain}
              OriginPath: /${param:apiGatewayStage}
              CustomOriginConfig:
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
                OriginSSLProtocols:
                  - TLSv1.2
          CacheBehaviors:
            - PathPattern: /api/*
              TargetOriginId: ApiGatewayOrigin
              ViewerProtocolPolicy: https-only
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
              CachedMethods: [GET, HEAD]
              # CachingDisabled — never cache API responses
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
              # AllViewerExceptHostHeader — forward cookies, query strings, and all headers
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized (AWS managed)
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
          ViewerCertificate:
            AcmCertificateArn: !Ref FrontendCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          PriceClass: PriceClass_100

    FrontendDNSRecord:
      Type: AWS::Route53::RecordSet
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID}
        Name: ${param:domain}
        Type: A
        AliasTarget:
          DNSName: !GetAtt FrontendDistribution.DomainName
          EvaluateTargetHealth: false
          HostedZoneId: Z2FDTNDATAQYW2 # CloudFront's fixed hosted zone ID

  Outputs:
    BucketName:
      Value: !Ref FrontendBucket
      Export:
        Name: vida-frontend-bucket-${self:provider.stage}
    CloudFrontDistributionId:
      Value: !Ref FrontendDistribution
      Export:
        Name: vida-frontend-cf-id-${self:provider.stage}
    CloudFrontUrl:
      Value: !Sub "https://${FrontendDistribution.DomainName}"
    DomainUrl:
      Value: https://${param:domain}
